syntax = "proto3";

// Service Interface
service MiniSplunk{

	rpc Ingest(stream LogString) returns (RequestStatus);              // Service for File Ingests. Accepts a stream (flow) of `LogString` messages.

	rpc Purge(PurgeRequest) returns (RequestStatus);					// Service for Purging Logs. Accepts a `PurgeRequest` message to signal Server.

	rpc SearchDate(QueryRequest) returns (LogResults);			// Service for filtering logs based on Date criterion. Returns `LogResults` containing 0-n `LogString` messages.

	rpc SearchHost(QueryRequest) returns (LogResults);			// Service for filtering logs based on Hostname criterion. Returns `LogResults` containing 0-n `LogString` messages.

	rpc SearchDaemon(QueryRequest) returns (LogResults);		// Service for filtering logs based on Process criterion. Returns `LogResults` containing 0-n `LogString` messages.

	rpc SearchSeverity(QueryRequest) returns (LogResults);		// Service for filtering logs based on Severity criterion. Returns `LogResults` containing 0-n `LogString` messages.

	rpc SearchKeyword(QueryRequest) returns (LogResults);		// Service for filtering logs based on Keyword/s criterion. Returns `LogResults` containing 0-n `LogString` messages.

	rpc CountKeyword(QueryRequest) returns (LogCount);			// Service for filtering logs based on Keyword/s criterion and accumulating matches. Returns `LogCount` match amount message.
}

// Request Formats

// String containing a standard Syslog message 
message LogString{
	string message = 1;
}

// Query Request sent by the Client
message QueryRequest{
	string argument = 1;	// e.g., "Invalid"
}

message PurgeRequest{} // No arguments, since Client only needs to Signal Server to Purge

// Response Formats

// Array of strings (log results)
message LogResults{
	repeated LogString log_entries = 1;
}

// Integer corresponding to amount of matched logs
message LogCount{
	int64 count = 1;
}

// Status signifying Success (boolean True) or Fail (boolean False)
message RequestStatus{
	bool status = 1;
}